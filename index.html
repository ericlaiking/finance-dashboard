<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資決策戰情室 | Market Dashboard</title>
    <meta name="description" content="自動化投資決策儀表板 — VOO、0050、00713 即時數據分析與買賣信號">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header class="dashboard-header">
        <h1>📊 戰情室 <span style="font-weight:400; font-size:14px; color:var(--text-secondary);">Market Dashboard</span></h1>
        <div class="header-meta">
            <span id="last-updated">更新中...</span>
            <button id="theme-toggle" class="theme-toggle" title="切換色系">🌙</button>
        </div>
    </header>

    <!-- News Ticker -->
    <div class="news-ticker-container">
        <div class="news-ticker-label">國際快訊</div>
        <div class="news-ticker-wrapper">
            <div class="news-ticker-content" id="news-ticker-content">
                載入中...
            </div>
        </div>
    </div>

    <!-- Tab Navigation -->
    <nav class="tab-nav" id="tab-nav">
        <button class="tab-btn active" data-target="tab-voo" data-source="./data/voo.json">
            🇺🇸 美股 VOO
            <span class="tab-price" id="price-voo">--</span>
        </button>
        <button class="tab-btn" data-target="tab-qqq" data-source="./data/qqq.json">
            🇺🇸 科技 QQQ
            <span class="tab-price" id="price-qqq">--</span>
        </button>
        <button class="tab-btn" data-target="tab-0050" data-source="./data/tw0050.json">
            🇹🇼 台股 0050
            <span class="tab-price" id="price-0050">--</span>
        </button>
        <button class="tab-btn" data-target="tab-00713" data-source="./data/defense00713.json">
            🛡️ 避風 00713
            <span class="tab-price" id="price-00713">--</span>
        </button>
    </nav>

    <!-- Signal Banner (shared across tabs) -->
    <div class="signal-banner" id="signal-banner">
        <div class="signal-icon" id="signal-icon">--</div>
        <div class="signal-body">
            <div class="signal-title" id="signal-title">載入中...</div>
            <div class="signal-meta" id="signal-meta"></div>
            <ul class="signal-reasons" id="signal-reasons"></ul>
        </div>
    </div>

    <!-- Tab: VOO -->
    <div id="tab-voo" class="tab-content active">
        <div class="fund-header" id="fund-header-voo"></div>
        <div class="indicators-grid" id="grid-voo"></div>
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">近期走勢</span>
                <div class="chart-filters" data-target="voo">
                    <button class="filter-btn" data-days="30">30D</button>
                    <button class="filter-btn" data-days="90">90D</button>
                    <button class="filter-btn active" data-days="180">180D</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="chart-voo"></canvas>
            </div>
        </div>
    </div>

    <!-- Tab: QQQ -->
    <div id="tab-qqq" class="tab-content">
        <div class="fund-header" id="fund-header-qqq"></div>
        <div class="indicators-grid" id="grid-qqq"></div>
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">近期走勢</span>
                <div class="chart-filters" data-target="qqq">
                    <button class="filter-btn" data-days="30">30D</button>
                    <button class="filter-btn" data-days="90">90D</button>
                    <button class="filter-btn active" data-days="180">180D</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="chart-qqq"></canvas>
            </div>
        </div>
    </div>

    <!-- Tab: 0050 -->
    <div id="tab-0050" class="tab-content">
        <div class="fund-header" id="fund-header-0050"></div>
        <div class="indicators-grid" id="grid-0050"></div>
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">近期走勢</span>
                <div class="chart-filters" data-target="0050">
                    <button class="filter-btn" data-days="30">30D</button>
                    <button class="filter-btn" data-days="90">90D</button>
                    <button class="filter-btn active" data-days="180">180D</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="chart-0050"></canvas>
            </div>
        </div>
    </div>

    <!-- Tab: 00713 -->
    <div id="tab-00713" class="tab-content">
        <div class="fund-header" id="fund-header-00713"></div>
        <div class="indicators-grid" id="grid-00713"></div>
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">近期走勢</span>
                <div class="chart-filters" data-target="00713">
                    <button class="filter-btn" data-days="30">30D</button>
                    <button class="filter-btn" data-days="90">90D</button>
                    <button class="filter-btn active" data-days="180">180D</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="chart-00713"></canvas>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader">載入數據中...</div>

    <!-- Footer -->
    <footer class="dashboard-footer">
        Data sources: Yahoo Finance, CNN, TWSE, NDC &nbsp;·&nbsp; 本工具不構成投資建議
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
