name: Hourly Finance Update

on:
  push:
    branches: [ main ]
  schedule:
    # Changed from 10 minutes to every hour as per the refactor plan
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scraper
        run: npm check || npm install

      - name: Run Scraper Engine
        working-directory: ./scraper
        run: node index.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add data/*
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "沒有新資料，跳過存檔"
          else
            git commit -m "Auto-update finance data & decision signals"
            git pull --rebase origin main
            git push
          fi
